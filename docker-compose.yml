services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: huddle-web
    depends_on:
      - server
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    ports:
      - "3000:3000"
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: huddle-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://huddle:huddle@postgres:5432/huddle}
      DIRECT_URL: ${COMPOSE_DIRECT_URL:-postgresql://huddle:huddle@postgres:5432/huddle}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:3000}
      BULLMQ_QUEUE_PREFIX: ${BULLMQ_QUEUE_PREFIX:-huddle}
      TYPING_TIMEOUT_MS: ${TYPING_TIMEOUT_MS:-3000}
      HEARTBEAT_TTL_SECONDS: ${HEARTBEAT_TTL_SECONDS:-45}
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "4000:4000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: huddle-worker
    command: ["npm", "--workspace", "@huddle/server", "run", "start:worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://huddle:huddle@postgres:5432/huddle}
      DIRECT_URL: ${COMPOSE_DIRECT_URL:-postgresql://huddle:huddle@postgres:5432/huddle}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      BULLMQ_QUEUE_PREFIX: ${BULLMQ_QUEUE_PREFIX:-huddle}
      REALTIME_WORKER_CONCURRENCY: ${REALTIME_WORKER_CONCURRENCY:-5}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: huddle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: huddle
      POSTGRES_USER: huddle
      POSTGRES_PASSWORD: huddle
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huddle -d huddle"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - huddle-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: huddle-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  huddle-postgres-data:
